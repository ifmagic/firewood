name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Firewood ${context.ref.replace('refs/tags/', '')}`,
              body: `## ✨ 新功能

            - 关于弹窗新增「Desktop Utility Suite」入口，可一键跳转项目 GitHub 主页。

            ## 🐛 修复

            - 修复关于弹窗更新说明解析逻辑，正确提取并展示变更内容。
            - 修复发布流程中 create-release 阶段调用 tauri 命令失败的问题。

            ## 🔧 优化

            - 托盘点击行为优化为左键直接打开应用、右键显示菜单。
            - 发布提示词与工作流逻辑同步，统一 github-script 的 release body 更新方式。

            ---

            ## 下载

            - **macOS (Apple Silicon)**: 下载 \`firewood_0.5.7_aarch64.dmg\`
            - **macOS (Intel)**: 下载 \`firewood_0.5.7_x64.dmg\`
            - **Windows**: 下载 \`.exe\` 安装包

            ## macOS 安装说明

            由于应用暂未通过 Apple 公证，首次打开需执行以下任一方式：

            **方式一（推荐）**：终端运行一行命令移除隔离标记后再打开
            \`\`\`bash
            xattr -cr /Applications/Firewood.app
            \`\`\`

            **方式二**：点击打开提示风险之后, 前往系统设置 -> 隐私与安全性 -> 找到 Firewood, 点击"仍要打开"按钮`,
              draft: true,
              prerelease: false
            });
            return data.id;
          result-encoding: string

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
