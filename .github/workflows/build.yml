name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Firewood ${context.ref.replace('refs/tags/', '')}`,
              body: `## 🐛 Bug Fixes

            - Fix release notes parsing so the first markdown heading is no longer truncated in the About panel.

            ## 🔧 Chore / Updates

            - Add MIT LICENSE file to the repository.
            - Include release prompt refinement updates from the merged maintenance pull request.

            ---

            ## Download

            - **macOS (Apple Silicon)**: Download \\\`firewood_0.6.1_aarch64.dmg\\\`
            - **macOS (Intel)**: Download \\\`firewood_0.6.1_x64.dmg\\\`
            - **Windows**: Download the \\\`.exe\\\` installer

            ## macOS Installation Guide

            Since the app is not yet notarized by Apple, you need to bypass Gatekeeper on the first launch using one of the following methods:

            **Method 1 (Recommended)**: Run this single command in your Terminal to remove the quarantine attribute, then open the app normally:
            \\\`\\\`\\\`bash
            xattr -cr /Applications/Firewood.app
            \\\`\\\`\\\`

            **Method 2**: Open the app, and when you see the security warning, go to **System Settings -> Privacy & Security**, scroll down to find Firewood, and click **"Open Anyway"**.`,
              draft: true,
              prerelease: false
            });
            return data.id;
          result-encoding: string

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest

    steps:
      - name: Patch latest.json notes and publish release
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = ${{ needs.create-release.outputs.release_id }};

            // Get the draft release to read its body
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            const releaseBody = release.body || '';

            // Find the latest.json asset
            const assets = release.assets || [];
            const latestJsonAsset = assets.find(a => a.name === 'latest.json');

            if (latestJsonAsset) {
              // Download the existing latest.json
              const { data: assetData } = await github.rest.repos.getReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: latestJsonAsset.id,
                headers: { accept: 'application/octet-stream' },
              });

              const latestJson = JSON.parse(Buffer.from(assetData).toString('utf-8'));
              latestJson.notes = releaseBody;

              // Delete the old asset
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: latestJsonAsset.id,
              });

              // Upload the patched latest.json
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: 'latest.json',
                data: JSON.stringify(latestJson, null, 2),
                headers: { 'content-type': 'application/json' },
              });

              console.log('Patched latest.json with release notes');
            } else {
              console.log('latest.json not found in release assets, skipping patch');
            }

            // Publish the release (set draft to false)
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
            });

            console.log('Release published');
