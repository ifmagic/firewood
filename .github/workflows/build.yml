name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Firewood ${{ github.ref_name }}'
          releaseBody: |
            ## ✨ 新功能

            - 图片排版工具增强：新增图片缩放、页面留白、手机照片推荐、证件/票据模式与恢复默认等快捷参数能力
            - About 面板新增版本号点击查看修改点：可直接查看当前版本对应的发布说明

            ## 🐛 修复

            - 修复图片排版双图场景尺寸观感不一致问题，改为先统一默认视觉尺寸再缩放
            - 修复图片排版设置区按钮遮挡问题与清空后旧图片回流问题

            ## 🔧 优化

            - 版本说明请求增加短时缓存与并发去重：同版本短时间重复查看可复用首次结果

            ---

            ## 下载

            - **macOS**: 下载 `firewood_x.x.x_universal.dmg`（支持 Intel & Apple Silicon）
            - **Windows**: 下载 `.msi` 或 `.exe` 安装包

            ## macOS 安装说明

            由于应用暂未通过 Apple 公证，首次打开需执行以下任一方式：

            **方式一（推荐）**：终端运行一行命令移除隔离标记后再打开
            ```bash
            xattr -cr /Applications/Firewood.app
            ```

            **方式二**：点击打开提示风险之后, 前往系统设置 -> 隐私与安全性 -> 找到 Firewood, 点击“仍要打开”按钮
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
