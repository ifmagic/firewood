<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="flame-outer" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ff2d00"/>
    </linearGradient>
    <linearGradient id="flame-inner" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ffdd57"/>
      <stop offset="60%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle glow behind flame -->
  <ellipse cx="256" cy="320" rx="100" ry="40" fill="#ff4500" opacity="0.15"/>

  <!-- Outer flame -->
  <path d="
    M256 96
    C256 96 310 170 330 220
    C350 270 360 300 350 340
    C340 380 316 410 290 425
    C270 436 256 438 256 438
    C256 438 242 436 222 425
    C196 410 172 380 162 340
    C152 300 162 270 182 220
    C202 170 256 96 256 96Z
  " fill="url(#flame-outer)"/>

  <!-- Middle flame -->
  <path d="
    M256 170
    C256 170 296 230 310 270
    C324 310 326 336 318 360
    C310 384 290 400 272 410
    C264 414 256 416 256 416
    C256 416 248 414 240 410
    C222 400 202 384 194 360
    C186 336 188 310 202 270
    C216 230 256 170 256 170Z
  " fill="url(#flame-inner)"/>

  <!-- Inner bright core -->
  <path d="
    M256 260
    C256 260 280 300 286 324
    C292 348 288 366 278 382
    C270 394 262 400 256 402
    C250 400 242 394 234 382
    C224 366 220 348 226 324
    C232 300 256 260 256 260Z
  " fill="#fffbe6" opacity="0.9"/>

  <!-- Two small logs at the bottom -->
  <rect x="148" y="400" width="240" height="24" rx="12" fill="#8B5E3C" transform="rotate(-8 268 412)"/>
  <rect x="140" y="416" width="240" height="24" rx="12" fill="#6B3F22" transform="rotate(6 260 428)"/>
</svg>
